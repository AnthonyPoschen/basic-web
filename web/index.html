<!DOCTYPE html>
<html>

<head>
	<link rel="stylesheet" href="/shadcn-classless.css">
	<script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.8/dist/htmx.min.js"></script>

	<script src="/framework/utils.js"></script>
	<script src="/framework/loader.js"></script>
	<script src="/framework/router.js"></script>

	<style>
		:not(:defined) {
			display: none;
		}

		:root {
			font-family: "Segoe UI", sans-serif;
		}

		body {
			max-width: 60rem;
			margin: 0 auto;
			padding: 2rem 1rem 4rem;
		}

		nav {
			display: flex;
			gap: 1rem;
			flex-wrap: wrap;
			margin-bottom: 2rem;
		}

		route-view {
			display: block;
		}

		@media (prefers-color-scheme: dark) {
			:root {}
		}
	</style>
	<script>
		window.Router.register('/', 'page-home');
		window.Router.register('/items', 'page-items');
		window.Router.register('/items/:uuid', 'page-item');
	</script>

</head>

<body>
	<nav>
		<a href="/">Home</a>
		<a href="/items">Items</a>
	</nav>

	<route-view not-found="page-home"></route-view>
</body>

</html>
