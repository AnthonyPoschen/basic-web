<template id="page-item">
    <div class="container">
        <h1>Item</h1>
        <p>Resolved UUID: <span id="uuid">not provided</span></p>
    </div>
</template>

<script>
    customElements.define('page-item', class extends HTMLElement {
        constructor() {
            super();
            this.attachShadow({ mode: 'open' })
            const template = document.getElementById('page-item');
            const templateContent = template.content;
            
            this.shadowRoot.appendChild(templateContent.cloneNode(true));
        }

		connectedCallback() {
			this.render();
		}

		render() {
            console.log(this.route);
            const routeUuid = this.route?.params?.uuid
                || this.route?.query?.uuid
                || this.route?.queryKeys?.uuid
                || 'not provided';
			this.shadowRoot.getElementById('uuid').textContent = routeUuid;
		}
    });
</script>
